name: Unit Tests

on:
  push:
    branches: [ main, task-1, task-2, task-3, task-4, task-5 ]
  pull_request:
    branches: [ main, task-1, task-2, task-3, task-4, task-5 ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8 (non-blocking on style, blocking on syntax errors)
        run: |
          flake8 src/ tests/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ scripts/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing
